apiVersion: v1
kind: Service
metadata:
  name: marketing-agent-service
  namespace: tormentnexus
  labels:
    app: marketing-agent
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: marketing-agent
    version: blue # Change this to 'green' to route traffic during deployment
