name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sales_bot
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: false

    - name: Initialize Borg Submodule
      run: git submodule update --init borg

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    - name: Install dependencies
      run: go mod download

    - name: Verify Version Consistency
      run: |
        V1=$(cat VERSION)
        V2=$(cat VERSION.md)
        if [ "$V1" != "$V2" ]; then
          echo "Version mismatch: VERSION($V1) != VERSION.md($V2)"
          exit 1
        fi

    - name: Run Integrity Tests
      run: go test ./internal/gitcheck/...

    - name: Run Conflict Resolution Tests
      run: go test ./internal/gitres/...

    - name: Run All Project Tests
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/sales_bot?sslmode=disable
      run: go test ./...

    - name: Build
      run: go build -v -o sales_bot ./cmd/sales_bot
