# =============================================================================
# hypernexus.site — Multi-tenant TN deployment + Demo
# =============================================================================

# HTTP → HTTPS redirect (all subdomains)
server {
    listen 80;
    listen [::]:80;
    server_name hypernexus.site www.hypernexus.site *.hypernexus.site;
    return 301 https://$host$request_uri;
}

# Main hypernexus.site — Premium landing page + Stripe billing
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hypernexus.site www.hypernexus.site;

    ssl_certificate /etc/letsencrypt/live/hypernexus.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hypernexus.site/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    root /var/www/hypernexus.site;
    index home_router.html index.html;

    add_header X-Frame-Options 'SAMEORIGIN' always;
    add_header X-Content-Type-Options 'nosniff' always;
    add_header X-XSS-Protection '1; mode=block' always;
    add_header Referrer-Policy 'strict-origin-when-cross-origin' always;
    add_header Permissions-Policy 'camera=(), microphone=(), geolocation=()' always;
    add_header Strict-Transport-Security 'max-age=31536000; includeSubDomains; preload' always;

    # AI crawler files - serve with proper content type
    location = /llms.txt {
        default_type text/plain;
        add_header Cache-Control "public, max-age=86400" always;
    }

    location = /robots.txt {
        default_type text/plain;
        add_header Cache-Control "public, max-age=86400" always;
    }

    location = /sitemap.xml {
        default_type application/xml;
        add_header Cache-Control "public, max-age=86400" always;
    }

    location ^~ /.well-known/acme-challenge/ {
        root /srv/www/hypernexus.site;
        try_files $uri =404;
    }

    # Route marketing agent v1 API to port 8084
    location /api/v1/ {
        proxy_pass http://127.0.0.1:8084;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # TN API + Stripe billing fallback
    location /api/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Allow-Origin '*' always;
        add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS' always;
        add_header Access-Control-Allow-Headers '*' always;
    }

    # TN tRPC
    location /trpc {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location = /download {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        rewrite ^ /download.html last;
    }

    location = /pricing {
        rewrite ^ /pricing.html last;
    }

    location = /terms {
        rewrite ^ /terms.html last;
    }

    location = /privacy {
        rewrite ^ /privacy.html last;
    }

    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri $uri/ /404.html;
    }
}


# Wildcard tenant subdomains: *.hypernexus.site
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ~^(?<tenant>[^.]+)\.hypernexus\.site$;

    ssl_certificate /etc/letsencrypt/live/hypernexus.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hypernexus.site/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Tenant-ID $tenant;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /health {
        proxy_pass http://127.0.0.1:7790/health;
        access_log off;
    }
}
