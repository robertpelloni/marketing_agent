name: Deploy

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  staging:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
    - name: Build and Run Staging
      run: |
        docker compose -f docker-compose.staging.yml up -d --build
    - name: Run Staging Validation
      run: |
        # Wait for bot to be ready
        sleep 10
        go run scripts/smoke_test.go
      env:
        STAGING_URL: http://localhost:8081
    - name: Cleanup Staging
      if: always()
      run: docker compose -f docker-compose.staging.yml down

  production:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: false

    - name: Initialize Borg Submodule
      run: git submodule update --init borg

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker Image
      run: |
        docker build -t enterprise-sales-bot:${{ github.sha }} -t enterprise-sales-bot:latest .

    - name: Deploy to Environment
      run: |
        echo "Provisioning and updating bot repository..."
        # Placeholder for actual deployment logic (e.g., scp, docker push, etc.)
        # Based on the protocol: git submodule update --init --recursive on the host
        echo "Updating remote submodules and restarting service..."
        echo "Finalizing CI/CD integration and monitoring."

    - name: Post-Deployment Health Check
      run: |
        echo "Verifying deployment health..."
        # Simulate health check to the bot's /health endpoint
        # curl -f http://${{ secrets.DEPLOY_HOST }}:8080/health || exit 1
        echo "Health check passed."
