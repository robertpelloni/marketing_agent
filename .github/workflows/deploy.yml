name: Deploy

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    needs: lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sales_bot
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
    - name: Run Tests
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/sales_bot?sslmode=disable
      run: go test -v ./...

  staging:
    needs: test
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build and Run Staging
      run: docker compose -f docker-compose.staging.yml up -d --build
    - name: Run Staging Validation
      run: sleep 10 && go run scripts/smoke_test.go
      env:
        STAGING_URL: http://localhost:8081
    - name: Cleanup Staging
      if: always()
      run: docker compose -f docker-compose.staging.yml down

  production:
    needs: [test, staging]
    if: (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')))
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build Docker Image
      run: |
        docker build -t enterprise-sales-bot:latest .
    - name: Deploy to Production
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.DEPLOY_HOST }}
        username: root
        key: ${{ secrets.DEPLOY_KEY }}
        script: |
          cd /app/enterprise_sales_bot
          git fetch --all --tags
          git checkout ${{ github.sha }}
          git submodule update --init --recursive
          docker compose up -d --build
