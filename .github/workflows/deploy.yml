name: Deploy

on:
  push:
    branches: [ main, 'autodev/**' ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
      - name: Run Gosec Security Scanner
        uses: securego/gosec@master
        with:
          args: ./...

  test:
    needs: lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sales_bot
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
        cache: true
    - name: Verify Version Consistency
      run: |
        V1=$(cat VERSION)
        V2=$(cat VERSION.md)
        if [ "$V1" != "$V2" ]; then
          echo "Version mismatch: VERSION($V1) != VERSION.md($V2)"
          exit 1
        fi
    - name: Verify Go Modules
      run: |
        go mod tidy
        git diff --exit-code go.mod go.sum
    - name: Run Tests with Coverage
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/sales_bot?sslmode=disable
      run: |
        go test -v -coverprofile=coverage.out ./...
        go tool cover -func=coverage.out

  staging:
    needs: test
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build and Run Staging
      run: docker compose -f docker-compose.staging.yml up -d --build
    - name: Run Staging Validation
      run: sleep 10 && go run scripts/smoke_test.go
      env:
        TARGET_URL: http://localhost:8081
    - name: Cleanup Staging
      if: always()
      run: docker compose -f docker-compose.staging.yml down

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
        cache: true
    - name: Build
      run: go build -v -o bin/sales_bot ./cmd/sales_bot
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: sales_bot_bin
        path: bin/sales_bot

  production:
    needs: [test, staging, build]
    if: (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')))
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build Docker Image
      run: |
        docker build -t enterprise-sales-bot:latest .
    - name: Deploy to Production
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.DEPLOY_HOST }}
        username: root
        key: ${{ secrets.DEPLOY_KEY }}
        script: |
          cd /app/enterprise_sales_bot
          git fetch --all --tags
          git checkout ${{ github.sha }}
          git submodule update --init --recursive
          docker compose up -d --build
    - name: Production Smoke Test
      run: |
        go run scripts/smoke_test.go
      env:
        TARGET_URL: ${{ secrets.PRODUCTION_URL }}
