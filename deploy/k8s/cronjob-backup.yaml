apiVersion: batch/v1
kind: CronJob
metadata:
  name: marketing-agent-db-backup
  namespace: tormentnexus
spec:
  schedule: "0 2 * * *" # Run at 2 AM daily
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: pg-backup
            image: postgres:16-alpine # Includes pg_dump
            command:
            - /bin/sh
            - -c
            - |
              apk add --no-cache aws-cli && \
              export PGPASSWORD=$DB_PASSWORD && \
              pg_dump -h $DB_HOST -U $DB_USER -d $DB_NAME | gzip > /tmp/backup.sql.gz && \
              aws s3 cp /tmp/backup.sql.gz s3://$S3_BUCKET/db_backup_$(date +%Y%m%d_%H%M%S).sql.gz
            env:
            - name: DB_HOST
              value: "tormentnexus-postgres" # Adjust to match your DB service name
            - name: DB_USER
              value: "postgres"
            - name: DB_NAME
              value: "marketing_agent"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: marketing-agent-secrets
                  key: DATABASE_PASSWORD # Assuming you add this to the secret
            - name: S3_BUCKET
              value: "tormentnexus-backups"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_DEFAULT_REGION
              value: "us-east-1"
          restartPolicy: OnFailure
