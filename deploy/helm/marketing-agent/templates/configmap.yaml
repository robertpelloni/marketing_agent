apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "marketing-agent.fullname" . }}-config
  labels:
    {{- include "marketing-agent.labels" . | nindent 4 }}
data:
  ENVIRONMENT: {{ .Values.config.environment | quote }}
  PORT: {{ .Values.config.port | quote }}
  HERMES_MODEL: {{ .Values.config.hermesModel | quote }}
  DEEPSEEK_MODEL: {{ .Values.config.deepseekModel | quote }}
  SMTP_HOST: {{ .Values.config.smtpHost | quote }}
  SMTP_PORT: {{ .Values.config.smtpPort | quote }}
  SMTP_FROM: {{ .Values.config.smtpFrom | quote }}
  SMTP_FROM_NAME: {{ .Values.config.smtpFromName | quote }}
  IMAP_HOST: {{ .Values.config.imapHost | quote }}
  IMAP_PORT: {{ .Values.config.imapPort | quote }}
  IMAP_FOLDER: {{ .Values.config.imapFolder | quote }}
  IMAP_POLL_INTERVAL: {{ .Values.config.imapPollInterval | quote }}
  DEPLOY_SYNC_INTERVAL: {{ .Values.config.deploySyncInterval | quote }}
  DRY_RUN: {{ .Values.config.dryRun | quote }}
