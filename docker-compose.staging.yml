version: '3.8'

services:
  marketing-agent-staging:
    build: .
    ports:
      - "8087:8080"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres-staging:5432/sales_bot_staging?sslmode=disable
      - ENVIRONMENT=staging
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - CRM_WEBHOOK_KEY=${CRM_WEBHOOK_KEY}
    depends_on:
      postgres-staging:
        condition: service_healthy

  postgres-staging:
    image: ankane/pgvector:v0.5.1
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=sales_bot_staging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
