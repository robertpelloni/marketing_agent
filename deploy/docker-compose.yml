services:
  web:
    build:
      context: .
      target: web
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    depends_on:
      - core
    restart: always

  core:
    build:
      context: .
      target: core
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=data/tormentnexus.db
      - REDIS_URL=redis://redis:6379
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=tormentnexus
    depends_on:
      - db
      - redis
    restart: always
    volumes:
      - ./data:/app/data
      - ./documents:/app/documents
      - ./sessions:/app/sessions
      - ./profiles:/app/profiles
      - ./handoffs:/app/handoffs
      - ./logs:/app/logs
      - ./agents:/app/agents
      - ./skills:/app/skills

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=tormentnexus
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

volumes:
  postgres_data:
  redis_data:
