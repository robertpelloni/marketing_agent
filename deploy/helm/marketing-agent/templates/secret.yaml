apiVersion: v1
kind: Secret
metadata:
  name: {{ include "marketing-agent.fullname" . }}-secret
  labels:
    {{- include "marketing-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secrets.databaseUrl }}
  DATABASE_URL: {{ .Values.secrets.databaseUrl | quote }}
  {{- end }}
  {{- if .Values.secrets.secretKey }}
  SECRET_KEY: {{ .Values.secrets.secretKey | quote }}
  {{- end }}
  {{- if .Values.secrets.githubToken }}
  GITHUB_TOKEN: {{ .Values.secrets.githubToken | quote }}
  {{- end }}
  {{- if .Values.secrets.githubWebhookSecret }}
  GITHUB_WEBHOOK_SECRET: {{ .Values.secrets.githubWebhookSecret | quote }}
  {{- end }}
  {{- if .Values.secrets.crmBaseUrl }}
  CRM_BASE_URL: {{ .Values.secrets.crmBaseUrl | quote }}
  {{- end }}
  {{- if .Values.secrets.crmApiKey }}
  CRM_API_KEY: {{ .Values.secrets.crmApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.hermesApiUrl }}
  HERMES_API_URL: {{ .Values.secrets.hermesApiUrl | quote }}
  {{- end }}
  {{- if .Values.secrets.hermesApiKey }}
  HERMES_API_KEY: {{ .Values.secrets.hermesApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.deepseekApiKey }}
  DEEPSEEK_API_KEY: {{ .Values.secrets.deepseekApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.hunterApiKey }}
  HUNTER_API_KEY: {{ .Values.secrets.hunterApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.apolloApiKey }}
  APOLLO_API_KEY: {{ .Values.secrets.apolloApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.smtpUsername }}
  SMTP_USERNAME: {{ .Values.secrets.smtpUsername | quote }}
  {{- end }}
  {{- if .Values.secrets.smtpPassword }}
  SMTP_PASSWORD: {{ .Values.secrets.smtpPassword | quote }}
  {{- end }}
  {{- if .Values.secrets.imapUsername }}
  IMAP_USERNAME: {{ .Values.secrets.imapUsername | quote }}
  {{- end }}
  {{- if .Values.secrets.imapPassword }}
  IMAP_PASSWORD: {{ .Values.secrets.imapPassword | quote }}
  {{- end }}
  {{- if .Values.secrets.stripeApiKey }}
  STRIPE_API_KEY: {{ .Values.secrets.stripeApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.stripeWebhookSecret }}
  STRIPE_WEBHOOK_SECRET: {{ .Values.secrets.stripeWebhookSecret | quote }}
  {{- end }}
  {{- if .Values.secrets.outboundWebhookUrl }}
  OUTBOUND_WEBHOOK_URL: {{ .Values.secrets.outboundWebhookUrl | quote }}
  {{- end }}
  {{- if .Values.secrets.outboundWebhookSecret }}
  OUTBOUND_WEBHOOK_SECRET: {{ .Values.secrets.outboundWebhookSecret | quote }}
  {{- end }}
  {{- if .Values.secrets.linkedinUsername }}
  LINKEDIN_USERNAME: {{ .Values.secrets.linkedinUsername | quote }}
  {{- end }}
  {{- if .Values.secrets.linkedinPassword }}
  LINKEDIN_PASSWORD: {{ .Values.secrets.linkedinPassword | quote }}
  {{- end }}
  {{- if .Values.secrets.redisUrl }}
  REDIS_URL: {{ .Values.secrets.redisUrl | quote }}
  {{- end }}
