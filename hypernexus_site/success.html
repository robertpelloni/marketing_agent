<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HyperNexus — Payment Successful</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: #f8fafc; color: #1e293b; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #fff; border-radius: 16px; padding: 48px; max-width: 500px; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
    .check { width: 64px; height: 64px; background: #dcfce7; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; font-size: 32px; }
    h1 { font-size: 24px; font-weight: 800; margin-bottom: 12px; }
    p { color: #64748b; font-size: 15px; line-height: 1.6; margin-bottom: 24px; }
    .btn { display: inline-block; background: linear-gradient(180deg, #0284c7, #0369a1); color: #fff; padding: 12px 32px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 15px; transition: transform 0.2s; }
    .btn:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">✓</div>
    <h1>Payment Successful!</h1>
    <p>Thank you for purchasing HyperNexus Professional. Your account is being provisioned. Check your email for login credentials and next steps.</p>
    <a href="https://hypernexus.site" class="btn">Back to HyperNexus</a>
  </div>
</body>
</html>
