name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    - name: Install dependencies
      run: go mod download

    - name: Run Integrity Tests
      run: go test ./internal/gitcheck/...

    - name: Run Conflict Resolution Tests
      run: go test ./internal/gitres/...

    - name: Build
      run: go build -v ./...
