# FreeLLM Proxy — OpenCode Zen primary, up to 3 concurrent, LM Studio fallback
general_settings:
  master_key: ""

model_list:
  - model_name: free-llm
    litellm_params:
      model: openai/north-mini-code-free
      api_key: os.environ/OPENCODE_ZEN_API_KEY
      api_base: https://api.opencodezen.ai/v1
      rpm: 3
      max_tokens: 8192
      timeout: 86400
      stream_timeout: 86400

  - model_name: free-llm
    litellm_params:
      model: openai/llama
      api_base: http://localhost:1234/v1
      api_key: ""
      rpm: 60
      max_tokens: 4096
      timeout: 30

router_settings:
  routing_strategy: usage-based-routing
  fallbacks:
    - free-llm: ["free-llm"]
  allowed_fails: 9999
  num_retries: 0
  retry_after: 600000
  cooldown_time: 7200
  max_parallel_requests: 3
