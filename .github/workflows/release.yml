name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          cd go
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          go build -buildvcs=false -ldflags="-s -w" \
            -o ../tormentnexus-${{ matrix.suffix }}${EXT} \
            ./cmd/tormentnexus
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tormentnexus-${{ matrix.suffix }}
          path: tormentnexus-${{ matrix.suffix }}*

  build-windows-installer:
    name: Build Windows Installer (NSIS)
    needs: [build]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: tormentnexus-windows-amd64
          path: build/
      - name: Install NSIS
        run: choco install nsis -y
      - name: Prepare installer files
        run: |
          Remove-Item -Recurse -Force installer `
            -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path installer -Force
          Copy-Item "build/tormentnexus-windows-amd64.exe" `
            "installer/tormentnexus.exe"
          Copy-Item "installers/windows/tormentnexus.nsi" `
            "installer/"
          Copy-Item "installers/windows/install-gui.ps1" `
            "installer/"
          Copy-Item "installers/windows/install.bat" `
            "installer/"
          Copy-Item "LICENSE.txt" "installer/"
      - name: Build NSIS installer
        run: |
          cd installer
          & "C:\Program Files (x86)\NSIS\makensis.exe" `
            tormentnexus.nsi
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer/tormentnexus-setup.exe

  create-release:
    name: Create GitHub Release
    needs: [build, build-windows-installer]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: binaries
      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: installer
      - name: Create release archives
        run: |
          mkdir -p release
          for dir in binaries/tormentnexus-*; do
            name=$(basename $dir)
            if [[ "$name" == *"windows"* ]]; then
              zip "release/${name}.zip" "$dir"/*
            else
              tar czf "release/${name}.tar.gz" "$dir"/*
            fi
          done
          cp installers/windows/install-gui.ps1 release/
          cp installers/windows/install.bat release/
          cp installers/macos/install-terminal.sh release/
          cp installers/linux/install.sh release/
          cp installer/tormentnexus-setup.exe release/ \
            2>/dev/null || true
          ls -la release/
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
